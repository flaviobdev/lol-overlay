<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LoL Overlay</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow:wght@500;600;700&family=Rajdhani:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/style.css" />
    <!-- cliente socket.io servido automaticamente pelo servidor -->
    <script src="/socket.io/socket.io.js"></script>
  </head>
  <body>
    <div id="status" class="status">
      <span class="status-dot"></span>
      <span class="status-text">Procurando fila…</span>
    </div>

    <div id="hud" class="hud hidden">
      <div class="clock-badge"><span id="clock">00:00</span><em id="mode">Clássico</em></div>
      <div id="player" class="player"></div>
      <div class="objectives">
        <div class="obj">
          <span class="obj-label">Dragões</span>
          <span class="obj-score">
            <b class="mine" id="drag-mine">0</b><i>–</i><b class="enemy" id="drag-enemy">0</b>
          </span>
        </div>
        <div class="obj">
          <span class="obj-label">Torres</span>
          <span class="obj-score">
            <b class="mine" id="tower-mine">0</b><i>–</i><b class="enemy" id="tower-enemy">0</b>
          </span>
        </div>
      </div>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
