<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LoL Overlay</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow:wght@500;600;700&family=Rajdhani:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/style.css" />
    <!-- cliente socket.io servido automaticamente pelo servidor -->
    <script src="/socket.io/socket.io.js"></script>
  </head>
  <body>
    <div id="status" class="status">
      <span class="status-dot"></span>
      <span class="status-text">Procurando fila…</span>
    </div>

    <div id="scoreboard" class="scoreboard hidden">
      <section class="team team-order" aria-label="Time Azul">
        <header class="team-head">
          <span class="team-label">TIME AZUL</span>
        </header>
        <div class="players" id="players-order"></div>
      </section>

      <div class="center">
        <div class="clock" id="clock">00:00</div>
        <div class="mode" id="mode">CLÁSSICO</div>
      </div>

      <section class="team team-chaos" aria-label="Time Vermelho">
        <header class="team-head">
          <span class="team-label">TIME VERMELHO</span>
        </header>
        <div class="players" id="players-chaos"></div>
      </section>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
